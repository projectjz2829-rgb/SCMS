{% extends "base.html" %}
{% block title %}401 – Unauthorized - SCMS{% endblock %}
{% block page_title %}Unauthorized{% endblock %}

{% block content %}
<div class="container-fluid py-5 d-flex flex-column align-items-center justify-content-center" style="min-height: 60vh;">
  <div class="text-center fade-in" style="max-width: 480px;">
    <div style="font-size: 5rem; line-height: 1; margin-bottom: 1.5rem; color: var(--color-danger);">
      <i class="bi bi-lock-fill"></i>
    </div>
    <h1 style="font-family: var(--font-display); font-size: 5rem; font-weight: 800; color: var(--color-primary); line-height: 1;">401</h1>
    <h2 style="font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; margin-bottom: 0.75rem;">Unauthorized</h2>
    <p class="text-muted mb-4" style="font-size: var(--text-sm);">
      You must be logged in to access this page. Please sign in with your credentials to continue.
    </p>
    <a href="{{ url_for('auth.login') }}" class="btn scms-btn-primary px-5 py-3">
      <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
    </a>
  </div>
</div>
{% endblock %}
